name: Actualizar SONICS Loreto

on:
  workflow_dispatch:

  schedule:
    # Corre todos los días a las 12:00 UTC, aprox. 7:00 a.m. Perú
    - cron: "0 12 * * *"

jobs:
  actualizar-sonics:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar actualización SONICS
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR: ${{ secrets.FTP_DIR }}

          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_JSON: ${{ secrets.GOOGLE_SERVICE_JSON }}
          GOOGLE_SERVICE_JSON_PATH: ""

          GPKG_PATH: Data/estaciones_hidrometricas_loreto_latlong_COMID_actualizado.gpkg
        run: |
          python scripts/01_actualizar_sonics_ftp.py
