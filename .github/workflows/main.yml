name: Actualizar datos Loreto

on:
  workflow_dispatch:
  schedule:
    - cron: "7 16 * * *"

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy xarray pyarrow google-api-python-client google-auth google-auth-httplib2 h5netcdf h5py scipy pyreadr

      - name: Diagnosticar conexión FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          python - << 'PY'
          import os
          import socket
          import urllib.request

          host = os.environ["FTP_HOST"].strip()

          print("FTP_HOST configurado:", "sí")

          try:
              ip_publica = urllib.request.urlopen("https://api.ipify.org", timeout=20).read().decode()
              print("IP pública del runner:", ip_publica)
          except Exception as e:
              print("No se pudo obtener IP pública:", e)

          print("Resolviendo FTP...")
          infos = socket.getaddrinfo(host, 21, proto=socket.IPPROTO_TCP)

          for info in infos:
              ip = info[4][0]
              print("IP FTP encontrada:", ip)

          print("Probando puerto 21...")
          for info in infos:
              ip = info[4][0]
              try:
                  s = socket.create_connection((ip, 21), timeout=30)
                  print("OK puerto 21:", ip)
                  s.close()
              except Exception as e:
                  print("FALLÓ puerto 21:", ip, e)
          PY

      - name: Ejecutar actualización
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_JSON: ${{ secrets.GOOGLE_SERVICE_JSON }}
          GPKG_PATH: Data/estaciones_hidrometricas_loreto_latlong_COMID_actualizado.gpkg
        run: |
          for i in 1 2 3
          do
            echo "Intento $i de 3"
            python scripts/01_actualizar_sonics_ftp.py && exit 0
            echo "Falló intento $i"
            sleep 60
          done

          echo "Fallaron los 3 intentos"
          exit 1
